<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Basic Meta -->
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>VibeDetect — Analyze AI vs Human Written Code</title>
  <!-- <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';"> -->

  <!-- SEO -->
  <meta name="description" content="VibeDetect analyzes code to detect whether it is AI-generated or written by humans.">
  <meta name="keywords" content="AI code detection, AI vs human code, machine learning code analysis, developer tools">
  <meta name="author" content="VibeDetect Team">
  <meta name="robots" content="index, follow">

  <!-- Canonical -->
  <link rel="canonical" href="https://vibedetect.com/">

  <!-- Theme -->
  <meta name="theme-color" content="#0f172a">

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <!-- Performance Optimization -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Open Graph -->
  <meta property="og:title" content="VibeDetect — AI vs Human Code Analyzer">
  <meta property="og:description" content="Analyze and detect whether code is AI-generated or human-written.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vibedetect.com">
  <meta property="og:image" content="preview.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="VibeDetect — AI vs Human Code Analyzer">
  <meta name="twitter:description" content="Analyze and detect whether code is AI-generated or human-written.">
  <meta name="twitter:image" content="preview.png">
</head>
<body>

  <!-- No JS Fallback -->
  <noscript>
    <p style="text-align:center;padding:20px;">
      This application requires JavaScript to run properly.
    </p>
  </noscript>

  <!-- Header Slot -->
  <header id="slot-header">
  <h1>VibeDetect — AI vs Human Code Analyzer</h1>
  </header>

  <!-- Navigation -->
  <nav class="nav-tabs z1" role="tablist" aria-label="Main navigation">

    <button 
      class="nav-tab active"
      role="tab"
      aria-selected="true"
      aria-controls="page-analyze"
      data-tab="analyze"
      id="tab-analyze">
      ⚡ Analyze
    </button>

    <button 
      class="nav-tab"
      role="tab"
      aria-selected="false"
      aria-controls="page-github"
      data-tab="github"
      id="tab-github">
      🐙 GitHub Scanner
    </button>

    <button 
      class="nav-tab"
      role="tab"
      aria-selected="false"
      aria-controls="page-models"
      data-tab="models"
      id="tab-models">
      🤖 ML Models
    </button>

    <button 
      class="nav-tab"
      role="tab"
      aria-selected="false"
      aria-controls="page-dataset"
      data-tab="dataset"
      id="tab-dataset">
      📊 Dataset
    </button>

    <button 
      class="nav-tab"
      role="tab"
      aria-selected="false"
      aria-controls="page-about"
      data-tab="about"
      id="tab-about">
      ℹ️ How It Works
    </button>

  </nav>

  <!-- Analyze Page -->
  <main>
    <section
      id="page-analyze"
      class="page active z1"
      role="tabpanel"
      aria-labelledby="tab-analyze">
      <div id="slot-analyze">
      <div class="loader"></div>
      </div>
    </section>

  <!-- GitHub Scanner -->
    <section
      id="page-github"
      class="page z1"
      role="tabpanel"
      aria-labelledby="tab-github"
      hidden>
      <div id="slot-github"></div>
    </section>

  <!-- ML Models -->
    <section
      id="page-models"
      class="page z1"
      role="tabpanel"
      aria-labelledby="tab-models"
      hidden>
      <div id="slot-models"></div>
    </section>

  <!-- Dataset -->
    <section
      id="page-dataset"
      class="page z1"
      role="tabpanel"
      aria-labelledby="tab-dataset"
      hidden>
      <div id="slot-dataset"></div>
    </section>

  <!-- About -->
    <section
      id="page-about"
      class="page z1"
      role="tabpanel"
      aria-labelledby="tab-about"
      hidden>
      <div id="slot-about"></div>
    </section>
  </main>

  <!-- Footer Slot -->
  <div id="slot-footer"></div>

  <!-- Scripts -->
  <script src="js/loader.js" defer></script>
  <script src="js/patterns.js" defer></script>
  <script src="js/analysis.js" defer></script>
  <script src="js/render.js" defer></script>
  <script src="js/editor.js" defer></script>
  <script src="js/examples.js" defer></script>
  <script src="js/github.js" defer></script>
  <script src="js/app.js" defer></script>

</body>
</html>
